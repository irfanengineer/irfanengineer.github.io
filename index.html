<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Irfan Ahmed | Career Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg, #020617, #0f172a);
  color:#e2e8f0;
}

header {
  text-align:center;
  padding:80px;
  background:#020617;
}

h2 {
  margin-top:40px;
  border-bottom:2px solid cyan;
}

section {
  max-width:900px;
  margin:auto;
  padding:30px;
}

.card {
  background:#1e293b;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
}

.button {
  background:cyan;
  padding:10px;
  color:black;
  text-decoration:none;
  margin:5px;
  display:inline-block;
  border-radius:5px;
}

/* Text areas */
textarea {
  width:100%;
  height:120px;
  margin-top:10px;
  padding:10px;
  border-radius:5px;
  border:none;
}
</style>

</head>

<body>

<header>
<h1>Irfan Ahmed</h1>
<p>Career Dashboard | IT | Automation | Electrical</p>
</header>

<section>

<!-- DASHBOARD -->
<h2>Quick Access</h2>
<div class="card">
<a href="https://github.com/IrfanAhmed1989" class="button">GitHub</a>
<a href="https://www.linkedin.com/in/irfan-a-a68bb6145" class="button">LinkedIn</a>
<a href="resume.pdf" class="button">Resume</a>
<a href="https://linkedin.com/jobs" class="button">Jobs</a>
</div>

<!-- APPLY MESSAGE -->
<h2>Apply Message</h2>
<div class="card">
<textarea>
Hi,

I am a multi-disciplinary Engineer with 10+ years experience in IT, SCADA systems, and automation.

Portfolio:
https://IrfanAhmed1989.github.io

Looking forward to contributing to your team.

Thank you,
Irfan Ahmed
</textarea>
</div>

<!-- JOB TRACKER -->
<h2>Job Tracker</h2>
<div class="card">
<textarea placeholder="Example:
Company | Role | Date Applied | Status
Amazon | IT Engineer | June 30 | Applied
Google | Systems Engineer | July 1 | Pending"></textarea>
</div>

<!-- NOTES -->
<h2>Notes</h2>
<div class="card">
<textarea placeholder="Write notes, ideas, or preparation here..."></textarea>
</div>

<!-- DAILY TASK -->
<h2>Daily Plan</h2>
<div class="card">
<p>✔ Apply to 20 jobs</p>
<p>✔ Check messages</p>
<p>✔ Update GitHub or skills</p>
</div>

</section>

</body>
</html>
